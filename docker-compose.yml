version: "3.9"

services:
  appsite:
    build: ./appsite
    container_name: appsite
    restart: unless-stopped
    networks:
      - webnet

  partners:
    build: ./partners
    container_name: partners
    restart: unless-stopped
    networks:
      - webnet

  managers:
    build: ./managers
    container_name: managers
    restart: unless-stopped
    networks:
      - webnet

  nginx:
    image: nginx:latest
    container_name: nginx_site
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - appsite
      - partners
      - managers
    networks:
      - webnet
      - maxbot_botnet

networks:
  webnet:
    driver: bridge
  maxbot_botnet:
    external: true