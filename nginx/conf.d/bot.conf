server {
    listen 80;
    server_name xn--90a0am.xn----btbccya0aicgcyy.xn--p1ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name xn--90a0am.xn----btbccya0aicgcyy.xn--p1ai;

    ssl_certificate     /etc/letsencrypt/live/xn--90a0am.xn----btbccya0aicgcyy.xn--p1ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn--90a0am.xn----btbccya0aicgcyy.xn--p1ai/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    resolver 127.0.0.11 valid=5s ipv6=off;

    location /yookassa/webhook {
        set $upstream parser;
        proxy_pass             http://$upstream:8000;
        proxy_http_version     1.1;
        proxy_set_header       Host $host;
        proxy_set_header       X-Real-IP $remote_addr;
        proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout     30s;
    }

    location / {
        return 200 'MAX WB Bot is running (HTTPS)';
        add_header Content-Type text/plain;
    }
}